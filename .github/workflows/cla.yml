name: "Pipeline | Contributor License Agreement"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: >
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/alexbeldam/canterlot-api/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: alexbeldam,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: |
            Thanks for the contribution! Before this can be merged, please sign our [Contributor License Agreement](https://github.com/alexbeldam/canterlot-api/blob/main/CLA.md).

            You can sign by replying to this pull request with exactly the following text:

            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. Thanks!"

name: "Pipeline | Keep Render Instance Warm"

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    environment: "main - canterlot-api"

    steps:
      - name: Ping /health
        run: curl -fsS "${{ vars.API_URL }}/health"

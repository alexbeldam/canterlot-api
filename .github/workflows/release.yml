name: "Pipeline | Prepare Release"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview the next version/changelog only - no commit, tag, push, or promotion to main"
        type: boolean
        default: true
      force_major:
        description: "Force a major version bump (e.g. cutting 1.0.0) regardless of commit analysis"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  guard:
    name: Ensure Dispatched From develop
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Dispatched From develop
        if: ${{ github.ref != 'refs/heads/develop' }}
        run: |
          echo "This workflow must be dispatched from 'develop', not '${{ github.ref_name }}'." >&2
          exit 1

  release:
    name: Version, Tag, and Promote to Main
    needs: guard
    uses: ./.github/workflows/release-core.yml
    with:
      dry_run: ${{ inputs.dry_run }}
      force_major: ${{ inputs.force_major }}
    secrets: inherit

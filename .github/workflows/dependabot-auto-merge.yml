name: "Pipeline | Auto-Merge Dependabot"

on:
  pull_request_target:
    types: [opened, synchronize]
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  metadata:
    name: Fetch Dependabot Metadata
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}

    steps:
      - name: Fetch Dependabot Metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

  auto-merge:
    name: Approve and Enable Auto-Merge
    needs: metadata
    runs-on: ubuntu-latest
    if: |
      needs.metadata.outputs.update-type == 'version-update:semver-patch' ||
      needs.metadata.outputs.update-type == 'version-update:semver-minor'

    steps:
      - name: Approve Patch/Minor Update
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_MERGE_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          review_decision=$(gh pr view "$PR_URL" --json reviewDecision --jq '.reviewDecision')
          if [ "$review_decision" = "APPROVED" ]; then
            echo "Already approved, skipping" >> "$GITHUB_STEP_SUMMARY"
          else
            gh pr review "$PR_URL" --approve -b "Auto-approved: patch/minor dependency update."
            echo "Approved $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enable Auto-Merge
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_MERGE_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          auto_merge_enabled=$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest != null')
          if [ "$auto_merge_enabled" = "true" ]; then
            echo "Auto-merge already enabled, skipping" >> "$GITHUB_STEP_SUMMARY"
          else
            gh pr merge "$PR_URL" --auto --merge
            echo "Enabled auto-merge for $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          fi

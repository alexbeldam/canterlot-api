services:
  mongodb:
    image: mongo:6.0
    container_name: canterlot_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=canterlot_db
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.0-alpine
    container_name: canterlot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
